name: scrape

on:
  schedule:
    # 06:00 UTC on Mon, Wed, Fri, Sun
    - cron: "0 6 * * 1,3,5,0"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max listing pages per target"
        required: false
        default: "3"

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install scraper
        working-directory: scraper
        run: pip install -e .

      - name: Install Playwright Chromium
        working-directory: scraper
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        working-directory: scraper
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '3' }}
          HEADLESS: "1"
        run: allegro-sc-scrape

      - name: Upload debug HTML (diagnostics for empty results)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: scraper/debug/
          if-no-files-found: ignore
          retention-days: 7
